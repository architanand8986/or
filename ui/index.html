<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge Sensor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #58a6ff;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9em;
      color: #8b949e;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }

    .card h3 {
      font-size: 0.85em;
      color: #8b949e;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card .value {
      font-size: 2em;
      font-weight: 700;
      color: #58a6ff;
    }

    .card .value.warn {
      color: #d29922;
    }

    .card .value.ok {
      color: #3fb950;
    }

    .chart-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .chart-container h3 {
      color: #8b949e;
      margin-bottom: 10px;
      font-size: 0.9em;
    }

    canvas {
      max-height: 250px;
    }

    .status-bar {
      text-align: center;
      padding: 8px;
      font-size: 0.8em;
      color: #8b949e;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }

    .status-dot.green {
      background: #3fb950;
    }

    .status-dot.red {
      background: #f85149;
    }
  </style>
</head>

<body>
  <h1>Edge Sensor Dashboard</h1>
  <p class="subtitle">Real-time metrics from VictoriaMetrics</p>

  <div class="grid">
    <div class="card">
      <h3>Temperature</h3>
      <div class="value" id="temperature">--</div>
    </div>
    <div class="card">
      <h3>Humidity</h3>
      <div class="value" id="humidity">--</div>
    </div>
    <div class="card">
      <h3>Queue Depth</h3>
      <div class="value" id="queue-depth">--</div>
    </div>
    <div class="card">
      <h3>Request Count</h3>
      <div class="value" id="request-count">--</div>
    </div>
    <div class="card">
      <h3>CPU Spike Duration (avg)</h3>
      <div class="value" id="cpu-spike">--</div>
    </div>
    <div class="card">
      <h3>Memory Usage</h3>
      <div class="value" id="memory-usage">--</div>
    </div>
  </div>

  <div class="chart-container">
    <h3>Temperature Over Time</h3>
    <canvas id="tempChart"></canvas>
  </div>

  <div class="chart-container">
    <h3>Queue Depth Over Time</h3>
    <canvas id="queueChart"></canvas>
  </div>

  <div class="chart-container">
    <h3>CPU Spike Duration Over Time</h3>
    <canvas id="cpuChart"></canvas>
  </div>

  <div class="status-bar">
    <span class="status-dot green" id="statusDot"></span>
    <span id="statusText">Connected</span> &mdash;
    Refreshes every 10s
  </div>

  <script src="app.js"></script>
</body>

</html>
